name: Payment CI

on:
  push:
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r payment/requirements.txt

      - name: Run unit tests
        run: |
          pytest payment/tests/test_unit.py

      - name: Run integration tests
        run: |
          pytest payment/tests/test_integration.py

      - name: Run functional tests
        run: |
          pytest payment/tests/test_functional.py